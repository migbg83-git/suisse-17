<header class="aw-navbar">
  <div class="container aw-navbar__inner">
    <a class="aw-navbar__brand" routerLink="/" (click)="closeMenu()">
      Archwise
    </a>

    <button 
      class="aw-navbar__toggle" 
      (click)="toggleMenu()"
      [attr.aria-expanded]="menuOpen"
      aria-label="Toggle navigation">
      <span class="aw-navbar__toggle-icon"></span>
      <span class="aw-navbar__toggle-icon"></span>
      <span class="aw-navbar__toggle-icon"></span>
    </button>

    <nav class="aw-navbar__nav" [class.active]="menuOpen" aria-label="Principal">
      <a 
        routerLink="/articulos" 
        routerLinkActive="active"
        (click)="closeMenu()">
        Artículos
      </a>
      <a 
        routerLink="/manifesto" 
        routerLinkActive="active"
        (click)="closeMenu()">
        Manifesto
      </a>
      <a 
        routerLink="/newsletter" 
        routerLinkActive="active"
        (click)="closeMenu()">
        Newsletter
      </a>
      <a 
        routerLink="/about" 
        routerLinkActive="active"
        (click)="closeMenu()">
        About
      </a>
    </nav>
  </div>
</header>
